# =============================================================================
# pytest.ini — pytest configuration file
# =============================================================================
# pytest reads this file automatically when you run `pytest` in the project root.
#
# HOW TO RUN TESTS:
#
#   Run all tests:
#     pytest tests/ -v
#
#   Run one test file:
#     pytest tests/test_chunker.py -v
#
#   Run one specific test:
#     pytest tests/test_chunker.py::TestChunkSingleDocument::test_empty_text_produces_no_chunks -v
#
#   Run only fast tests (skip slow embedding tests):
#     pytest tests/ -v -m "not slow"
#
#   Run only the slow tests:
#     pytest tests/ -v -m slow
#
#   Stop after first failure:
#     pytest tests/ -v -x
#
#   Show print() output (useful for debugging):
#     pytest tests/ -v -s
# =============================================================================

[pytest]

# Where pytest looks for tests
testpaths = tests

# How pytest recognises test files and functions
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers — use @pytest.mark.slow on tests that load the embedding model
# (these take ~5-10 seconds on first run; fast tests take <1 second)
markers =
    slow: marks tests as slow (load sentence-transformers model). Skip with: -m "not slow"

# Show short tracebacks by default (use --tb=long for more detail)
addopts = --tb=short
